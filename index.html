<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NANFU - Website Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        /* 左侧文字区 精准匹配图片蓝色底色 */
        .text-side {
            width: 45%;
            height: 100%;
            background-color: #0094DD;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 50px;
            color: #ffffff;
        }
        /* 右侧图片容器：内部居中显示图片，不贴最右边缘 */
        .img-side {
            flex: 1;
            height: 100%;
            background-color: #0094DD;
            background-image: url("battery.png");
            background-repeat: no-repeat;
            /* 图片在右侧区块里 水平+垂直居中 */
            background-position: center center;
            background-size: auto 100%;
        }
        .desc-text {
            font-size: 28px;
            line-height: 1.82;
            margin-bottom: 40px;
        }
        .email-row {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .email-row a {
            color: #fff;
            text-decoration: none;
        }
        .social-group a {
            color: #ff2222;
            font-size: 22px;
            margin-right: 20px;
            text-decoration: none;
            font-weight: 600;
        }
        /* 悬浮按钮固定全局 */
        .float-translate {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-weight: bold;
        }
        .float-service-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .red-notice-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background: #ff3333;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            text-align: center;
            line-height: 22px;
        }
    </style>
</head>
<body>
    <!-- 左侧文字蓝色区域 -->
    <div class="text-side">
        <div class="desc-text">
            The website is currently under upgrade and construction...<br>
            We apologize for any inconvenience caused<br>
            and appreciate your understanding. Thank you!
        </div>
        <div class="email-row">
            Email:<a href="mailto:export@nanfu.com">export@nanfu.com</a>
        </div>
        <div class="social-group">
            <a href="https://www.tiktok.com/@nanfu.huanyu?_r=1&_t=ZT-95775kbfKyj" target="_blank">TIKTOK</a>
            <a href="https://www.instagram.com/nanfuhuanyu?igsh=MXZ0ejEwcGhqMXBzMQ%3D%3D&utm_source=qr" target="_blank">Instagram</a>
            <a href="https://www.linkedin.com/company/nanfuhuanyu" target="_blank">Linkedin</a>
        </div>
    </div>
    <!-- 右侧图片区域，图片在区块内部居中 -->
    <div class="img-side"></div>

    <!-- 侧边悬浮控件 -->
    <div class="float-translate">A</div>
    <div class="float-service-btn">
        <span class="red-notice-badge">1</span>
    </div>
</body>
</html>
