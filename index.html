<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NANFU - Website Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #0094DD;
            color: #ffffff;
        }
        /* PC端布局 */
        @media screen and (min-width: 993px) {
            body {
                height: 100vh;
                overflow: hidden;
                display: flex;
                align-items: center;
            }
            .text-wrap {
                width: 45%;
                padding-left: 4%;
            }
            .img-wrap {
                flex: 1;
                height: 100%;
                background-image: url("battery.png");
                background-repeat: no-repeat;
                background-position: center right;
                background-size: auto 100%;
            }
        }
        /* 手机端布局，单独元素放图，不会重复重叠 */
        @media screen and (max-width: 992px) {
            body {
                overflow-x: hidden;
                overflow-y: auto;
                padding-bottom: 60px;
            }
            .img-wrap {
                width: 100%;
                padding-top: 180%;
                background-image: url("battery.png");
                background-repeat: no-repeat;
                background-position: center top;
                background-size: 100% auto;
            }
            .text-wrap {
                padding: 30px 20px 0;
            }
        }
        .desc-text {
            font-size: 28px;
            line-height: 1.82;
            margin-bottom: 40px;
        }
        .email-row {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .email-row a {
            color: #fff;
            text-decoration: none;
        }
        .social-group a {
            color: #ff2222;
            font-size: 22px;
            margin-right: 20px;
            text-decoration: none;
            font-weight: 600;
        }
        /* 悬浮按钮 */
        .float-translate {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-weight: bold;
        }
        .float-service-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .red-notice-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 22px;
            height: 22px;
            background: #ff3333;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            text-align: center;
            line-height: 22px;
        }
        /* 手机按钮修正 */
        @media screen and (max-width: 992px) {
            .float-translate {
                top: 20px;
                transform: none;
            }
            .desc-text {
                font-size: 20px;
                margin-bottom: 24px;
            }
            .email-row {
                font-size: 16px;
                margin-bottom: 20px;
            }
            .social-group a {
                font-size: 18px;
                margin-right: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- PC左右分栏 / 手机上下：图片容器 -->
    <div class="img-wrap"></div>
    <!-- 文字容器 -->
    <div class="text-wrap">
        <div class="desc-text">
            The website is currently under upgrade and construction...<br>
            We apologize for any inconvenience caused<br>
            and appreciate your understanding. Thank you!
        </div>
        <div class="email-row">
            Email:<a href="mailto:export@nanfu.com">export@nanfu.com</a>
        </div>
        <div class="social-group">
            <a href="https://www.tiktok.com/@nanfu.huanyu?_r=1&_t=ZT-95775kbfKyj" target="_blank">TIKTOK</a>
            <a href="https://www.instagram.com/nanfuhuanyu?igsh=MXZ0ejEwcGhqMXBzMQ%3D%3D&utm_source=qr" target="_blank">Instagram</a>
            <a href="https://www.linkedin.com/company/nanfuhuanyu" target="_blank">Linkedin</a>
        </div>
    </div>

    <div class="float-translate">A</div>
    <div class="float-service-btn">
        <span class="red-notice-badge">1</span>
    </div>
</body>
</html>
